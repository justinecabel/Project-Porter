services:
  reverse-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tailscale-funnel-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APPS_PATH: /etc/nginx/config/apps.json
      APP_COUNT: ${APP_COUNT:-2}
      APP_1_NAME: ${APP_1_NAME:-app-3001}
      APP_1_ROUTE: ${APP_1_ROUTE:-/app1/}
      APP_1_HOST: ${APP_1_HOST:-host.docker.internal}
      APP_1_PORT: ${APP_1_PORT:-3001}
      APP_2_NAME: ${APP_2_NAME:-vite-app}
      APP_2_ROUTE: ${APP_2_ROUTE:-/app2/}
      APP_2_HOST: ${APP_2_HOST:-host.docker.internal}
      APP_2_PORT: ${APP_2_PORT:-5173}
    volumes:
      - ./config:/etc/nginx/config
      - ./nginx/templates:/etc/nginx/templates:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
