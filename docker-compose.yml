services:
  reverse-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tailscale-funnel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./apps.json:/etc/nginx/apps.json:ro
      - ./nginx/templates:/etc/nginx/templates:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
